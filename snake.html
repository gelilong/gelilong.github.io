<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  h1 {
    color: #4ade80;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    text-shadow: 0 0 20px rgba(74,222,128,0.5);
  }

  .scoreboard {
    display: flex;
    gap: 2rem;
    margin-bottom: 0.8rem;
  }

  .score-box {
    text-align: center;
  }

  .score-label {
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-value {
    color: #fff;
    font-size: 1.4rem;
    font-weight: 700;
  }

  #gameCanvas {
    border: 2px solid rgba(74,222,128,0.3);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(74,222,128,0.15), inset 0 0 40px rgba(0,0,0,0.5);
    display: block;
    background: #0a0a14;
  }

  /* Overlay (start / game over) */
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,20,0.88);
    border-radius: 12px;
    pointer-events: auto;
  }

  #overlay h2 {
    color: #4ade80;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(74,222,128,0.6);
  }

  #overlay .final-score {
    color: rgba(255,255,255,0.7);
    font-size: 1rem;
    margin-bottom: 1.5rem;
  }

  #overlay .final-score span {
    color: #fbbf24;
    font-weight: 700;
    font-size: 1.3rem;
  }

  #playBtn {
    background: linear-gradient(135deg, #4ade80, #16a34a);
    color: #fff;
    border: none;
    padding: 0.85rem 2.5rem;
    border-radius: 50px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(74,222,128,0.35);
  }

  #playBtn:hover, #playBtn:active {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(74,222,128,0.5);
  }

  .hint {
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    margin-top: 0.8rem;
    letter-spacing: 1px;
  }

  /* Touch D-pad */
  #dpad {
    display: none;
    margin-top: 1rem;
    position: relative;
    width: 150px;
    height: 150px;
  }

  .dpad-btn {
    position: absolute;
    width: 46px;
    height: 46px;
    background: rgba(74,222,128,0.12);
    border: 1.5px solid rgba(74,222,128,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: rgba(74,222,128,0.9);
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad-btn:active {
    background: rgba(74,222,128,0.3);
  }

  #dUp    { top: 0;    left: 50%; transform: translateX(-50%); }
  #dDown  { bottom: 0; left: 50%; transform: translateX(-50%); }
  #dLeft  { left: 0;  top: 50%;  transform: translateY(-50%); }
  #dRight { right: 0; top: 50%;  transform: translateY(-50%); }

  .canvas-wrap {
    position: relative;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.3rem; }
    #dpad { display: block; }
  }
</style>
</head>
<body>

<h1>Snake</h1>

<div class="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Level</div>
    <div class="score-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">SNAKE</h2>
    <div class="final-score" id="overlayScore" style="display:none">
      Score: <span id="finalScore">0</span>
    </div>
    <button id="playBtn">Play</button>
    <p class="hint" id="overlayHint">Arrow keys or swipe to move</p>
  </div>
</div>

<div id="dpad">
  <div class="dpad-btn" id="dUp">▲</div>
  <div class="dpad-btn" id="dLeft">◀</div>
  <div class="dpad-btn" id="dRight">▶</div>
  <div class="dpad-btn" id="dDown">▼</div>
</div>

<script>
const COLS = 20;
const ROWS = 20;
const CELL = Math.min(Math.floor(Math.min(window.innerWidth - 32, window.innerHeight - 220) / COLS), 28);
const W = COLS * CELL;
const H = ROWS * CELL;

const canvas = document.getElementById('gameCanvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayScore = document.getElementById('overlayScore');
const finalScoreEl = document.getElementById('finalScore');
const playBtn = document.getElementById('playBtn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const levelEl = document.getElementById('level');

let snake, dir, nextDir, food, score, level, best, running, animFrame, lastTime, interval;

best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = best;

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9,  y: 10 },
    { x: 8,  y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  interval = 160;
  lastTime = 0;
  scoreEl.textContent = 0;
  levelEl.textContent = 1;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function setDir(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return; // no reversal
  nextDir = { x: dx, y: dy };
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += level * 10;
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('snakeBest', best);
    }
    // Level up every 5 food
    if (snake.length % 5 === 0) {
      level = Math.min(level + 1, 10);
      levelEl.textContent = level;
      interval = Math.max(60, 160 - (level - 1) * 11);
    }
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, H); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(W, j * CELL); ctx.stroke();
  }

  // Food
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const r = CELL * 0.38;
  const grd = ctx.createRadialGradient(fx - r * 0.3, fy - r * 0.3, 0, fx, fy, r * 1.1);
  grd.addColorStop(0, '#ff6b6b');
  grd.addColorStop(1, '#c0392b');
  ctx.beginPath();
  ctx.arc(fx, fy, r, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();
  // shine
  ctx.beginPath();
  ctx.arc(fx - r * 0.3, fy - r * 0.35, r * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const px = seg.x * CELL;
    const py = seg.y * CELL;
    const pad = 1.5;
    const sw = CELL - pad * 2;
    const sh = CELL - pad * 2;
    const cr = Math.max(3, CELL * 0.25);

    if (i === 0) {
      // Head
      const hg = ctx.createLinearGradient(px, py, px + CELL, py + CELL);
      hg.addColorStop(0, '#6ee7b7');
      hg.addColorStop(1, '#10b981');
      ctx.fillStyle = hg;
    } else {
      const ratio = 1 - (i / snake.length) * 0.6;
      ctx.fillStyle = `rgba(16, ${Math.floor(185 * ratio)}, ${Math.floor(129 * ratio)}, 1)`;
    }

    roundRect(ctx, px + pad, py + pad, sw, sh, cr);
    ctx.fill();

    // Head eyes
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const ex1 = px + CELL * 0.32;
      const ex2 = px + CELL * 0.68;
      const ey  = py + CELL * 0.35;
      const er  = CELL * 0.1;
      ctx.beginPath(); ctx.arc(ex1, ey, er, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey, er, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0a0a14';
      ctx.beginPath(); ctx.arc(ex1 + dir.x * er * 0.5, ey + dir.y * er * 0.5, er * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2 + dir.x * er * 0.5, ey + dir.y * er * 0.5, er * 0.5, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function loop(timestamp) {
  if (!running) return;
  animFrame = requestAnimationFrame(loop);
  if (timestamp - lastTime >= interval) {
    lastTime = timestamp;
    step();
    if (running) draw();
  }
}

function startGame() {
  overlay.style.display = 'none';
  init();
  draw();
  running = true;
  animFrame = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  cancelAnimationFrame(animFrame);
  overlayTitle.textContent = 'GAME OVER';
  finalScoreEl.textContent = score;
  overlayScore.style.display = 'block';
  playBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
}

playBtn.addEventListener('click', startGame);

// Keyboard controls
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); setDir(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); setDir(0,  1); break;
    case 'ArrowLeft':  e.preventDefault(); setDir(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); setDir(1,  0); break;
    case ' ':
      e.preventDefault();
      if (!running) startGame();
      break;
  }
});

// Swipe controls
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart || !running) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
}, { passive: false });

// D-pad buttons
document.getElementById('dUp').addEventListener('touchstart',    e => { e.preventDefault(); setDir(0, -1); }, { passive: false });
document.getElementById('dDown').addEventListener('touchstart',  e => { e.preventDefault(); setDir(0,  1); }, { passive: false });
document.getElementById('dLeft').addEventListener('touchstart',  e => { e.preventDefault(); setDir(-1, 0); }, { passive: false });
document.getElementById('dRight').addEventListener('touchstart', e => { e.preventDefault(); setDir(1,  0); }, { passive: false });

// Initial draw
init();
draw();
</script>
</body>
</html>
